name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build
        run: |
          xcodebuild -project YomiKit.xcodeproj \
            -scheme YomiKit \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-"

      - name: Create DMG
        run: |
          APP_PATH="build/Build/Products/Release/YomiKit.app"
          DMG_NAME="YomiKit-${GITHUB_REF_NAME}.dmg"

          mkdir -p dmg_contents
          cp -R "$APP_PATH" dmg_contents/
          ln -s /Applications dmg_contents/Applications

          hdiutil create -volname "YomiKit" \
            -srcfolder dmg_contents \
            -ov -format UDZO \
            "$DMG_NAME"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: YomiKit-*.dmg
          generate_release_notes: true
